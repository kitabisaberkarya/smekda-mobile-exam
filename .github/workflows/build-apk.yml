name: Build SMEKDA MOBILE TEST APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Setup Gradle Wrapper
        run: |
          # Download gradle-wrapper.jar
          wget -q -O android/gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v7.6.4/gradle/wrapper/gradle-wrapper.jar
          
          # Create gradlew script
          cat > android/gradlew << 'GRADLEW'
          #!/usr/bin/env sh
          APP_HOME=$(dirname "$0")
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          exec java $DEFAULT_JVM_OPTS $JAVA_OPTS $GRADLE_OPTS \
            "-Dorg.gradle.appname=gradlew" \
            -classpath "$CLASSPATH" \
            org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          chmod +x android/gradlew
          echo "Gradle wrapper ready"
          ls -la android/gradle/wrapper/

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SMEKDA-MOBILE-TEST-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: SMEKDA MOBILE TEST v${{ github.run_number }}
          body: |
            ## 📱 SMEKDA MOBILE TEST
            Aplikasi Ujian Digital SMKN 2 Sigli
            WebView → https://smekda-mobile-test.vercel.app/
            
            **⬇️ Download APK di bawah (Assets section)**
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
