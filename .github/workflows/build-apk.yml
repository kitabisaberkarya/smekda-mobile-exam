name: Build SMEKDA MOBILE TEST APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Install Gradle & Create Wrapper
        run: |
          # Install gradle via apt
          sudo apt-get update -qq
          sudo apt-get install -y gradle
          cd android
          gradle wrapper --gradle-version=7.6.3 --distribution-type=bin
          chmod +x gradlew
          ls -la gradlew gradle/wrapper/

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SMEKDA-MOBILE-TEST-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: SMEKDA MOBILE TEST v${{ github.run_number }}
          body: |
            ## 📱 SMEKDA MOBILE TEST
            Aplikasi Ujian Digital SMKN 2 Sigli
            **Download APK di bawah ⬇️**
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
