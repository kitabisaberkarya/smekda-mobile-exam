name: Build SMEKDA MOBILE TEST APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create fresh Flutter project & merge our code
        run: |
          # Create a complete flutter project as template
          flutter create --org com.smekda --project-name smekda_mobile_test /tmp/smekda_fresh
          
          # Copy our source files into fresh project
          cp -r lib/ /tmp/smekda_fresh/lib/
          cp pubspec.yaml /tmp/smekda_fresh/pubspec.yaml
          cp -r assets/ /tmp/smekda_fresh/assets/
          
          # Copy our custom android resources (icons, manifest)
          cp android/app/src/main/AndroidManifest.xml \
             /tmp/smekda_fresh/android/app/src/main/AndroidManifest.xml
          cp -r android/app/src/main/res/mipmap-* \
             /tmp/smekda_fresh/android/app/src/main/res/
          
          # Replace working directory with fresh project
          cp -r /tmp/smekda_fresh/android ./android_new
          rm -rf android
          mv android_new android
          
          echo "✅ Fresh Flutter project merged"
          ls android/
          ls android/gradle/wrapper/

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SMEKDA-MOBILE-TEST-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: SMEKDA MOBILE TEST v${{ github.run_number }}
          body: |
            ## 📱 SMEKDA MOBILE TEST
            Aplikasi Ujian Digital SMKN 2 Sigli
            
            **Download APK di bawah ⬇️**
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
